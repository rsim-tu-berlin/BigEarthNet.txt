<!DOCTYPE html>
<html lang="en">

<!--

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Link Coming Soon – BigEarthNet.txt Dataset</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(170deg, #002c63 0%, #29bad4 33%, #7ecce0 67%, #b1deec 100%);
      font-family: 'DM Sans', sans-serif;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 18px;
      padding: 52px 44px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(6px);
    }
    .icon {
      font-size: 2.4rem;
      margin-bottom: 20px;
    }
    h1 {
      font-family: 'Source Serif 4', serif;
      font-size: 1.55rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 14px;
      line-height: 1.3;
    }
    p {
      color: rgba(255,255,255,.65);
      font-size: .93rem;
      line-height: 1.7;
    }
    .divider {
      width: 36px;
      height: 2px;
      background: #7dd3fc;
      border-radius: 2px;
      margin: 22px auto;
    }
    a.back {
      display: inline-block;
      margin-top: 28px;
      color: #002c63;
      font-size: .85rem;
      text-decoration: none;
      border-bottom: 1px solid rgba(125,211,252,.35);
      padding-bottom: 2px;
      transition: border-color .15s;
    }
    a.back:hover { border-color: #7dd3fc; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔗</div>
    <h1>Link will be shared soon.</h1>
    <div class="divider"></div>
    <p>This resource is not yet publicly available. Check back shortly — we will update the link as soon as it is ready.</p>
    <a class="back" href="javascript:history.back()">← Go back</a>
  </div>
</body>
</html>
